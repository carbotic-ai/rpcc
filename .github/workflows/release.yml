name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            bin: rpcc-darwin-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            bin: rpcc-darwin-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bin: rpcc-linux-x64
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            bin: rpcc-win32-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build -p rpcc-core --release --target ${{ matrix.target }}
      - name: Prepare asset
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-2022" ]]; then
            cp "target/${{ matrix.target }}/release/rpcc-core.exe" "dist/${{ matrix.bin }}"
          else
            cp "target/${{ matrix.target }}/release/rpcc-core" "dist/${{ matrix.bin }}"
            chmod +x "dist/${{ matrix.bin }}"
          fi
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.bin }}

  npm-publish:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@carbotic-ai'
      - name: Install dependencies
        run: npm ci
      - name: Build TypeScript
        run: npm run build
        working-directory: packages/rpcc
      - name: Publish to GitHub Packages
        run: npm publish
        working-directory: packages/rpcc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_PUBLISH_TOKEN }}
